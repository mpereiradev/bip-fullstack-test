<div class="min-h-screen bg-app-bg flex flex-col">

  <!-- Topbar -->
  <header class="bg-surface shadow-card sticky top-0 z-30">
    <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">

      <!-- Brand -->
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-xl bg-primary-600 flex items-center justify-center">
          <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M12 6v12m-3-2.818l.879.659c1.171.879 3.07.879 4.242 0 1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12c-.725 0-1.45-.22-2.003-.659-1.106-.879-1.106-2.303 0-3.182s2.9-.879 4.006 0l.415.33" />
          </svg>
        </div>
        <span class="font-bold text-ink text-lg tracking-tight">BIP</span>
      </div>

      <!-- Nav -->
      <nav class="flex items-center gap-1">
        <a routerLink="/beneficios"
           routerLinkActive="bg-primary-50 text-primary-700 font-semibold"
           [routerLinkActiveOptions]="{ exact: false }"
           class="flex items-center gap-2 px-4 py-2 rounded-xl text-sm text-muted hover:bg-primary-50 hover:text-primary-700 transition-colors">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M3.75 12h16.5m-16.5 3.75h16.5M3.75 19.5h16.5M5.625 4.5h12.75a1.875 1.875 0 010 3.75H5.625a1.875 1.875 0 010-3.75z" />
          </svg>
          Benefícios
        </a>
      </nav>

    </div>
  </header>

  <!-- Page content -->
  <main class="flex-1">
    <router-outlet />
  </main>

</div>
